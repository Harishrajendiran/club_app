<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmashHard - Register a new user account.">
    <!-- Strict Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; frame-ancestors 'none';">
    <title>SmashHard - Register</title>
    <!-- Modern Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Decorative Premium Glow Effects -->
    <div class="glow-bg-container" aria-hidden="true">
        <div class="glow-blob blob-primary"></div>
        <div class="glow-blob blob-secondary"></div>
    </div>

    <!-- Main Container -->
    <main class="portal-container">
        <div class="portal-card">
            <header class="card-header">
                <div class="logo-wrapper">
                    <div class="smash-logo" aria-hidden="true"></div>
                </div>
                <h1>Join SmashHard</h1>
                <p class="subtitle">Please fill out the details to register your account.</p>
            </header>

            <!-- Server Flash Messages -->
            {% if error %}
            <div class="alert-box alert-error" role="alert">
                <span class="alert-icon">✗</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}
            {% if success %}
            <div class="alert-box alert-success" role="alert">
                <span class="alert-icon">✓</span>
                <span>{{ success }}</span>
            </div>
            {% endif %}

            <form action="/register" method="POST" id="register-form">
                <!-- CSRF Protection -->
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                <div class="input-group">
                    <label for="reg-username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="reg-username" name="username" placeholder="Choose a username" autocomplete="username" value="{{ form_data.username if form_data else '' }}" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-mobile">Mobile Number</label>
                    <div class="input-wrapper">
                        <input type="tel" id="reg-mobile" name="mobile" placeholder="Enter mobile number" autocomplete="tel" value="{{ form_data.mobile if form_data else '' }}" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="reg-email" name="email" placeholder="name@example.com" autocomplete="email" value="{{ form_data.email if form_data else '' }}" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="reg-password" name="password" placeholder="••••••••" autocomplete="new-password" required>
                        <button type="button" class="password-toggle" id="reg-pw-toggle" aria-label="Show password">
                            <span class="eye-icon" aria-hidden="true"></span>
                        </button>
                    </div>
                    <div class="strength-indicator" id="pw-strength-bar">
                        <div class="strength-segment"></div>
                        <div class="strength-segment"></div>
                        <div class="strength-segment"></div>
                        <div class="strength-segment"></div>
                    </div>
                    <p class="input-help" id="pw-strength-text">Password must be at least 8 characters.</p>
                </div>

                <button type="submit" class="btn btn-primary">
                    <span>Create Account</span>
                </button>
            </form>

            <footer class="form-footer">
                <p>Already have an account? <a href="/" class="switch-link">Log in</a></p>
            </footer>
        </div>
    </main>

    <script src="/static/register.js" defer></script>
</body>
</html>
